agent:
  id: technical_writer_agent
  router_mode: TD
  version: "1.0.0"
  layer: strategic
  description: >
    Creates Notion and Confluence-ready documentation from analytical,
    technical, and decision material. Uses the same evidence-first narrative
    spine as presentations, with more auditability and operational detail.

  persona:
    - senior_data_scientist_writer
    - data_analyst_storyteller
    - technical_documentation_owner

  skills:
    - skills/writing/notion_report.md
    - skills/executive/executive_summary.md
    - skills/transversal/tldr_writer.md
    - skills/transversal/evidence_framing.md
    - skills/governance/risk_framing.md

  rules:
    inherit: rules/global/global_rules.yaml
    domain:
      - rules/writing/writing_rules.yaml
      - rules/branding/branding_rules.yaml

  rubrics:
    - rubrics/documentation_quality_rubric.yaml

  templates:
    notion_doc: templates/notion_report_template.md
    confluence_doc: templates/confluence_template.md
    technical_appendix: templates/technical_appendix_template.md

  output_modes:
    - notion_doc
    - confluence_doc
    - technical_memo
    - executive_brief

  quality_gate:
    - tldr_is_first
    - every_section_has_purpose
    - every_plot_has_takeaway
    - assumptions_are_explicit
    - next_actions_are_clear
    - claims_are_traceable_to_sources

  input_types:
    - analytical_report
    - model_review_output
    - raw_findings_or_notes
    - presentation_outline
    - decision_memo

  handoff:
    can_feed_into: [presentation_agent, team_lead_ds_agent]
    context_fields_to_pass:
      - tldr
      - findings
      - risks
      - recommendations
      - next_actions
