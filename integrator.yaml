negrita_os:
  version: "0.1.0"
  description: "Metaagent operating system for analytical leadership, ML review, academic evaluation, technical writing, and research synthesis."

  global_rules:
    - rules/global/global_rules.yaml
    - rules/analysis/analysis_rules.yaml
    - rules/writing/writing_rules.yaml
    - rules/governance/governance_rules.yaml

  global_style:
    tone: "professional, technical, direct, reflective"
    default_language: "match_user_language"
    writing_profile:
      - senior_data_scientist
      - ai_systems_architect
      - product_aware_analyst
      - academic_reviewer
    avoid:
      - generic_ai_language
      - unsupported_recommendations
      - excessive_motivation
      - vague_conclusions

  default_output_contract:
    analytical_report:
      required_sections:
        - TLDR
        - Context
        - Objective
        - Methodology
        - Evidence
        - Findings
        - Interpretation
        - Risks_and_Caveats
        - Recommendations
        - Next_Actions

    plot_interpretation:
      required_fields:
        - what_it_shows
        - how_to_read_it
        - why_it_matters
        - operational_takeaway

    task_output:
      required_fields:
        - objective
        - scope
        - inputs
        - outputs
        - dependencies
        - risks
        - acceptance_criteria

  agents:

    presentation_agent:
      description: "Creates executive and technical presentations from analytical material."
      persona:
        - executive_storyteller
        - senior_data_scientist
        - product_strategist
      skills:
        - skills/executive/presentation_storyline.md
        - skills/executive/executive_summary.md
        - skills/transversal/tldr_writer.md
        - skills/transversal/evidence_framing.md
        - skills/governance/risk_framing.md
      rules:
        - rules/global/global_rules.yaml
        - rules/presentation/presentation_rules.yaml
        - rules/presentation/audience_profiles.yaml
        - rules/presentation/findings_contract.yaml
        - rules/branding/branding_rules.yaml
      rubrics:
        - rubrics/presentation_quality_rubric.yaml
      templates:
        - templates/executive_deck_outline_template.md
        - templates/technical_deck_outline_template.md
        - templates/slide_speaker_notes_template.md
      output_modes:
        - slide_outline
        - full_slide_content
        - speaker_notes
        - executive_summary
      quality_gate:
        - each_slide_has_one_core_message
        - each_chart_has_takeaway
        - recommendation_is_decision_oriented
        - appendix_separates_methodology_from_main_story

    paper_review_agent:
      description: "Reviews, summarizes, and operationalizes academic papers."
      persona:
        - research_scientist
        - academic_reviewer
        - applied_ai_strategist
      skills:
        - skills/academic/paper_synthesizer.md
        - skills/academic/research_quality_review.md
        - skills/academic/citation_extraction.md
        - skills/academic/methodology_deconstruction.md
        - skills/academic/tfm_opportunity_mapping.md
      rules:
        - rules/global/global_rules.yaml
        - rules/academic/academic_rules.yaml
        - rules/governance/governance_rules.yaml
      rubrics:
        - rubrics/research_quality_rubric.yaml
        - rubrics/academic_relevance_rubric.yaml
      templates:
        - templates/paper_summary_template.md
        - templates/literature_review_card_template.md
        - templates/tfm_research_mapping_template.md
      output_modes:
        - paper_digest
        - academic_review
        - implementation_notes
        - tfm_ideas
      quality_gate:
        - objective_is_identified
        - dataset_is_identified
        - methodology_is_explained
        - limitations_are_explicit
        - relevance_to_user_domains_is_mapped

    tfm_evaluator_agent:
      description: "Evaluates master's thesis proposals, milestones, and final work."
      persona:
        - academic_director
        - tribunal_reviewer
        - methodology_reviewer
      skills:
        - skills/academic/tfm_evaluation.md
        - skills/academic/objective_alignment.md
        - skills/academic/methodology_review.md
        - skills/academic/dataset_validation.md
        - skills/writing/academic_feedback_writer.md
      rules:
        - rules/global/global_rules.yaml
        - rules/academic/academic_rules.yaml
      rubrics:
        - rubrics/academic_tfm_rubric.yaml
        - rubrics/proposal_viability_rubric.yaml
      templates:
        - templates/tfm_milestone_review_template.md
        - templates/tribunal_report_template.md
        - templates/student_feedback_template.md
      output_modes:
        - section_by_section_review
        - tribunal_report
        - improvement_plan
        - scorecard
      quality_gate:
        - title_problem_objectives_are_aligned
        - objectives_are_measurable
        - dataset_is_feasible
        - methodology_matches_research_question
        - conclusions_are_supported_by_results

    model_review_agent:
      description: "Reviews ML models, EDA, explainability outputs, and operational readiness."
      persona:
        - senior_data_scientist
        - ml_governance_reviewer
        - operational_ml_strategist
      skills:
        - skills/ml/model_review.md
        - skills/ml/eda_review.md
        - skills/ml/explainability_review.md
        - skills/ml/leakage_detection.md
        - skills/ml/operational_rule_extraction.md
      rules:
        - rules/global/global_rules.yaml
        - rules/ml/ml_rules.yaml
        - rules/analysis/analysis_rules.yaml
      rubrics:
        - rubrics/model_review_rubric.yaml
        - rubrics/eda_rubric.yaml
      templates:
        - templates/model_review_report_template.md
        - templates/eda_report_template.md
        - templates/operational_rules_report_template.md
      output_modes:
        - notion_report
        - technical_review
        - executive_model_summary
        - operational_recommendations
      quality_gate:
        - target_definition_is_clear
        - split_strategy_is_reviewed
        - leakage_risk_is_assessed
        - metrics_are_interpreted_in_context
        - operational_rules_are_not_overclaimed

    code_review_agent:
      description: "Reviews Python, SQL, ML repositories, pipelines, and production-readiness."
      persona:
        - senior_ml_engineer
        - data_platform_reviewer
        - code_quality_reviewer
      skills:
        - skills/engineering/python_quality_review.md
        - skills/engineering/sql_bigquery_review.md
        - skills/engineering/reproducibility_review.md
        - skills/engineering/logging_config_review.md
        - skills/ml/model_review.md
      rules:
        - rules/global/global_rules.yaml
        - rules/engineering/engineering_rules.yaml
      rubrics:
        - rubrics/code_quality_rubric.yaml
        - rubrics/mlops_readiness_rubric.yaml
      templates:
        - templates/code_review_report_template.md
        - templates/refactor_plan_template.md
        - templates/pr_review_comment_template.md
      output_modes:
        - code_review_report
        - refactor_plan
        - pull_request_comments
        - technical_debt_register
      quality_gate:
        - risks_are_prioritized
        - reproducibility_is_assessed
        - logging_is_reviewed
        - data_leakage_paths_are_checked
        - tests_or_validation_are_recommended

    technical_writer_agent:
      description: "Creates Notion and Confluence-ready technical documentation."
      persona:
        - senior_data_scientist_writer
        - data_analyst_storyteller
        - technical_documentation_owner
      skills:
        - skills/writing/notion_report.md
        - skills/executive/executive_summary.md
        - skills/transversal/tldr_writer.md
        - skills/transversal/evidence_framing.md
        - skills/governance/risk_framing.md
      rules:
        - rules/global/global_rules.yaml
        - rules/writing/writing_rules.yaml
        - rules/branding/branding_rules.yaml
      rubrics:
        - rubrics/documentation_quality_rubric.yaml
      templates:
        - templates/notion_report_template.md
        - templates/confluence_template.md
        - templates/technical_appendix_template.md
      output_modes:
        - notion_doc
        - confluence_doc
        - technical_memo
        - executive_brief
      quality_gate:
        - every_section_has_purpose
        - every_plot_has_takeaway
        - assumptions_are_explicit
        - next_actions_are_clear

    team_lead_ds_agent:
      description: "Turns ambiguity into requirements, tasks, roadmaps, escalations, and follow-up systems."
      persona:
        - team_lead_data_scientist
        - technical_product_manager
        - delivery_governance_owner
      skills:
        - skills/transversal/structured_reasoning.md
        - skills/transversal/tldr_writer.md
        - skills/governance/risk_framing.md
      rules:
        - rules/global/global_rules.yaml
        - rules/governance/governance_rules.yaml
      rubrics:
        - rubrics/task_quality_rubric.yaml
      templates:
        - templates/jira_epic_template.md
        - templates/jira_story_template.md
        - templates/escalation_log_template.md
        - templates/four_month_roadmap_template.md
      output_modes:
        - requirement_breakdown
        - jira_epic
        - sprint_plan
        - escalation_register
        - weekly_summary
      quality_gate:
        - tasks_have_acceptance_criteria
        - blockers_are_explicit
        - owners_are_identified_or_marked_unknown
        - timeline_is_realistic
        - risks_are_actionable

    ai_trend_radar_agent:
      description: "Tracks AI, ML, Blockchain, AI governance, papers, tools, and production trends."
      persona:
        - ai_research_analyst
        - blockchain_researcher
        - strategic_technology_scout
      skills:
        - skills/academic/paper_synthesizer.md
        - skills/academic/tfm_opportunity_mapping.md
        - skills/governance/hype_vs_reality_review.md
        - skills/transversal/structured_reasoning.md
      rules:
        - rules/global/global_rules.yaml
        - rules/governance/governance_rules.yaml
      rubrics:
        - rubrics/research_quality_rubric.yaml
        - rubrics/technology_maturity_rubric.yaml
      templates:
        - templates/weekly_ai_blockchain_digest_template.md
        - templates/paper_digest_template.md
        - templates/tfm_topic_card_template.md
      output_modes:
        - weekly_digest
        - paper_list
        - topic_opportunities
        - strategic_brief
      quality_gate:
        - sources_are_current
        - claims_are_cited
        - relevance_is_explained
        - implementation_maturity_is_classified
        - potential_tfm_topics_are_actionable

    data_quality_sentinel_agent:
      description: "Detects, documents, and escalates data quality issues."
      persona:
        - data_quality_owner
        - ml_governance_reviewer
        - operational_risk_monitor
      skills:
        - skills/governance/risk_framing.md
        - skills/transversal/evidence_framing.md
        - skills/transversal/structured_reasoning.md
      rules:
        - rules/global/global_rules.yaml
        - rules/governance/governance_rules.yaml
      rubrics:
        - rubrics/data_quality_rubric.yaml
      templates:
        - templates/data_quality_incident_template.md
        - templates/escalation_log_template.md
        - templates/root_cause_analysis_template.md
      output_modes:
        - dq_incident
        - escalation_note
        - root_cause_report
        - monitoring_checklist
      quality_gate:
        - affected_tables_are_named
        - affected_period_is_defined
        - severity_is_assigned
        - evidence_is_reproducible
        - resolution_criteria_are_clear

  routing_rules:

    if_user_asks_for:
      presentation:
        use_agent: presentation_agent

      slides:
        use_agent: presentation_agent

      paper_review:
        use_agent: paper_review_agent

      academic_evaluation:
        use_agent: tfm_evaluator_agent

      thesis_review:
        use_agent: tfm_evaluator_agent

      model_analysis:
        use_agent: model_review_agent

      ebm_xgboost_autogluon:
        use_agent: model_review_agent

      code_review:
        use_agent: code_review_agent

      refactor:
        use_agent: code_review_agent

      notion_document:
        use_agent: technical_writer_agent

      confluence_document:
        use_agent: technical_writer_agent

      jira_tasks:
        use_agent: team_lead_ds_agent

      roadmap:
        use_agent: team_lead_ds_agent

      escalation:
        use_agent: team_lead_ds_agent

      data_quality_issue:
        use_agent: data_quality_sentinel_agent

      ai_news_or_trends:
        use_agent: ai_trend_radar_agent

      blockchain_research:
        use_agent: ai_trend_radar_agent

      tfm_topics:
        use_agent: ai_trend_radar_agent

  execution_policy:
    default_behavior:
      - classify_request
      - select_agent
      - load_global_rules
      - load_agent_rules
      - load_skills
      - load_rubrics
      - load_template
      - generate_output
      - run_quality_gate
      - provide_final_answer

    ambiguity_policy:
      if_minor_ambiguity:
        action: "make_reasonable_assumption_and_state_it"
      if_major_ambiguity:
        action: "ask_targeted_followup_question"

    evidence_policy:
      if_evidence_missing:
        action: "state_limitations_and_mark_as_hypothesis"

    web_research_policy:
      required_for:
        - current_ai_trends
        - current_blockchain_trends
        - recent_papers
        - tools_or_frameworks_after_2025
        - regulation_or_governance_updates
